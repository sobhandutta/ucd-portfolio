<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 800" font-family="Inter, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10z" fill="#7A8699"/>
    </marker>
    <marker id="arrB" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10z" fill="#125695"/>
    </marker>
    <marker id="arrT" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10z" fill="#2BA98C"/>
    </marker>
  </defs>

  <rect width="1440" height="800" fill="#FAFBFC"/>

  <!-- ── COL 1 · ASK ── -->
  <text x="36" y="40" font-size="11" font-weight="700" letter-spacing="1.8" fill="#7A8699">1 · ASK</text>

  <rect x="36" y="54" width="248" height="74" rx="12" fill="#FFFFFF" stroke="#D9DEE6" stroke-width="1.4"/>
  <circle cx="70" cy="91" r="15" fill="#125695"/>
  <path d="M70 85a5 5 0 1 1 0 10a5 5 0 0 1 0-10M60 102c1.5-6 6-8 10-8s8.5 2 10 8" stroke="#fff" stroke-width="1.7" fill="none" stroke-linecap="round"/>
  <text x="96" y="84" font-size="12.5" font-weight="600" fill="#1C2533">Network operator</text>
  <text x="96" y="101" font-size="10.5" fill="#5B6677">"Why is SLA degrading at</text>
  <text x="96" y="115" font-size="10.5" fill="#5B6677">site-123 since last night?"</text>

  <path d="M160 128 V 152" stroke="#7A8699" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="36" y="156" width="248" height="64" rx="12" fill="#FFFFFF" stroke="#D9DEE6" stroke-width="1.4"/>
  <text x="56" y="182" font-size="12.5" font-weight="700" fill="#1C2533">Intent / NL Interface</text>
  <text x="56" y="199" font-size="10.5" fill="#5B6677">no modes, no query builders —</text>
  <text x="56" y="212" font-size="10.5" fill="#5B6677">emits a normalized intent</text>

  <path d="M160 220 V 244" stroke="#7A8699" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="36" y="248" width="248" height="148" rx="12" fill="#10243A"/>
  <text x="56" y="272" font-size="9.5" font-weight="700" letter-spacing="1.2" fill="#7FB3D9">NORMALIZED INTENT</text>
  <g font-family="'JetBrains Mono', Menlo, monospace" font-size="10.5" fill="#C8D7E4">
    <text x="56" y="292">{ "intent": <tspan fill="#6FD3F2">"investigate_</tspan></text>
    <text x="68" y="307"><tspan fill="#6FD3F2">sla_degradation"</tspan>,</text>
    <text x="62" y="325">"scope": { "siteId": <tspan fill="#6FD3F2">"site-123"</tspan>,</text>
    <text x="74" y="340">"timeRange": <tspan fill="#6FD3F2">"last_24h"</tspan> },</text>
    <text x="62" y="358">"constraints": { "readOnly": <tspan fill="#76E0C2">true</tspan>,</text>
    <text x="74" y="373">"requiresApproval": <tspan fill="#76E0C2">true</tspan> } }</text>
  </g>

  <path d="M284 320 H 332" stroke="#125695" stroke-width="1.8" marker-end="url(#arrB)"/>
  <text x="290" y="310" font-size="10" font-weight="600" fill="#125695">intent</text>

  <!-- ── COL 2 · ORCHESTRATE ── -->
  <text x="336" y="40" font-size="11" font-weight="700" letter-spacing="1.8" fill="#7A8699">2 · PLAN &amp; ORCHESTRATE</text>

  <rect x="336" y="54" width="356" height="546" rx="14" fill="#FFFFFF" stroke="#125695" stroke-width="1.8"/>
  <path d="M336 68a14 14 0 0 1 14-14h328a14 14 0 0 1 14 14v30H336z" fill="#125695"/>
  <text x="358" y="85" font-size="14" font-weight="700" fill="#FFFFFF">Super-Agent · Orchestrator</text>

  <text x="358" y="122" font-size="10.5" fill="#5B6677">Owns no domain logic — plans, delegates, supervises.</text>

  <g font-size="12" font-weight="600" fill="#1C2533">
    <rect x="358" y="136" width="312" height="46" rx="9" fill="#F2F6FA" stroke="#D9DEE6"/>
    <circle cx="382" cy="159" r="11" fill="#125695"/><text x="382" y="163" font-size="10.5" fill="#fff" text-anchor="middle">1</text>
    <text x="402" y="156">Intent classification</text>
    <text x="402" y="172" font-size="10" font-weight="400" fill="#5B6677">category · required domains · risk</text>

    <rect x="358" y="190" width="312" height="46" rx="9" fill="#F2F6FA" stroke="#D9DEE6"/>
    <circle cx="382" cy="213" r="11" fill="#125695"/><text x="382" y="217" font-size="10.5" fill="#fff" text-anchor="middle">2</text>
    <text x="402" y="210">Task decomposition</text>
    <text x="402" y="226" font-size="10" font-weight="400" fill="#5B6677">sub-tasks with dependencies</text>

    <rect x="358" y="244" width="312" height="46" rx="9" fill="#F2F6FA" stroke="#D9DEE6"/>
    <circle cx="382" cy="267" r="11" fill="#125695"/><text x="382" y="271" font-size="10.5" fill="#fff" text-anchor="middle">3</text>
    <text x="402" y="264">Agent routing</text>
    <text x="402" y="280" font-size="10" font-weight="400" fill="#5B6677">capability lookup · parallel dispatch</text>

    <rect x="358" y="298" width="312" height="46" rx="9" fill="#F2F6FA" stroke="#D9DEE6"/>
    <circle cx="382" cy="321" r="11" fill="#125695"/><text x="382" y="325" font-size="10.5" fill="#fff" text-anchor="middle">4</text>
    <text x="402" y="318">Supervision</text>
    <text x="402" y="334" font-size="10" font-weight="400" fill="#5B6677">retries · timeouts · partial failures</text>

    <rect x="358" y="352" width="312" height="46" rx="9" fill="#F2F6FA" stroke="#D9DEE6"/>
    <circle cx="382" cy="375" r="11" fill="#125695"/><text x="382" y="379" font-size="10.5" fill="#fff" text-anchor="middle">5</text>
    <text x="402" y="372">Result aggregation</text>
    <text x="402" y="388" font-size="10" font-weight="400" fill="#5B6677">correlate · confidence · evidence</text>
  </g>

  <rect x="358" y="412" width="312" height="50" rx="9" fill="#EAF6FD" stroke="#9BDCF7"/>
  <text x="378" y="432" font-size="11.5" font-weight="700" fill="#0E6E93">Agent Registry</text>
  <text x="378" y="448" font-size="10" fill="#23627D">capability-declared agents · data-driven routing</text>

  <rect x="358" y="470" width="312" height="64" rx="9" fill="#FFF7E6" stroke="#F2D38C"/>
  <text x="378" y="490" font-size="11.5" font-weight="700" fill="#8A6116">Guardrails</text>
  <text x="378" y="506" font-size="10" fill="#7A5A1A">read-only default · approval gates · audit trail</text>
  <text x="378" y="520" font-size="10" fill="#7A5A1A">per-agent data boundary · injection protection</text>

  <!-- fan-out -->
  <path d="M692 170 C 740 170 740 110 786 110" stroke="#125695" stroke-width="1.8" fill="none" marker-end="url(#arrB)"/>
  <path d="M692 250 C 740 250 740 240 786 240" stroke="#125695" stroke-width="1.8" fill="none" marker-end="url(#arrB)"/>
  <path d="M692 330 C 740 330 740 370 786 370" stroke="#125695" stroke-width="1.8" fill="none" marker-end="url(#arrB)"/>
  <path d="M692 410 C 745 415 735 500 786 500" stroke="#125695" stroke-width="1.8" fill="none" marker-end="url(#arrB)"/>
  <text x="722" y="95" font-size="10" font-weight="600" fill="#125695">sub-tasks</text>

  <!-- ── COL 3 · AGENTS ── -->
  <text x="790" y="40" font-size="11" font-weight="700" letter-spacing="1.8" fill="#7A8699">3 · SPECIALIZED AGENTS</text>

  <rect x="790" y="54" width="264" height="106" rx="12" fill="#FFFFFF" stroke="#D9DEE6" stroke-width="1.4"/>
  <rect x="790" y="54" width="5" height="106" rx="2.5" fill="#46D5B3"/>
  <text x="814" y="80" font-size="12.5" font-weight="700" fill="#1C2533">SLA Agent</text>
  <text x="814" y="99" font-size="10.5" fill="#5B6677">analyze_kpi_degradation · inspect_alerts</text>
  <text x="814" y="122" font-size="10" font-weight="600" fill="#2BA98C">finds: drop-rate breach · Zone C · 3 days</text>
  <text x="814" y="144" font-size="9.5" fill="#7A8699">confidence 0.91</text>

  <rect x="790" y="184" width="264" height="106" rx="12" fill="#FFFFFF" stroke="#D9DEE6" stroke-width="1.4"/>
  <rect x="790" y="184" width="5" height="106" rx="2.5" fill="#01BCF3"/>
  <text x="814" y="210" font-size="12.5" font-weight="700" fill="#1C2533">RAN Agent</text>
  <text x="814" y="229" font-size="10.5" fill="#5B6677">analyze_gnb_status · radio metrics</text>
  <text x="814" y="252" font-size="10" font-weight="600" fill="#0E86B0">finds: handover failures C02 ↔ C03</text>
  <text x="814" y="274" font-size="9.5" fill="#7A8699">confidence 0.84</text>

  <rect x="790" y="314" width="264" height="106" rx="12" fill="#FFFFFF" stroke="#D9DEE6" stroke-width="1.4"/>
  <rect x="790" y="314" width="5" height="106" rx="2.5" fill="#125695"/>
  <text x="814" y="340" font-size="12.5" font-weight="700" fill="#1C2533">Core Agent</text>
  <text x="814" y="359" font-size="10.5" fill="#5B6677">analyze_5gc_status · AMF / SMF / UPF</text>
  <text x="814" y="382" font-size="10" font-weight="600" fill="#125695">finds: UPF timeouts · edge node 07</text>
  <text x="814" y="404" font-size="9.5" fill="#7A8699">confidence 0.78</text>

  <rect x="790" y="444" width="264" height="106" rx="12" fill="#FFFFFF" stroke="#D9DEE6" stroke-width="1.4"/>
  <rect x="790" y="444" width="5" height="106" rx="2.5" fill="#FFB800"/>
  <text x="814" y="470" font-size="12.5" font-weight="700" fill="#1C2533">Security Agent</text>
  <text x="814" y="489" font-size="10.5" fill="#5B6677">threat indicators · policy violations</text>
  <text x="814" y="512" font-size="10" font-weight="600" fill="#8A6116">finds: no threat correlation</text>
  <text x="814" y="534" font-size="9.5" fill="#7A8699">confidence 0.95</text>

  <!-- agents → tools -->
  <path d="M1054 107 H 1096" stroke="#7A8699" stroke-width="1.4" marker-end="url(#arr)"/>
  <path d="M1054 237 H 1096" stroke="#7A8699" stroke-width="1.4" marker-end="url(#arr)"/>
  <path d="M1054 367 H 1096" stroke="#7A8699" stroke-width="1.4" marker-end="url(#arr)"/>
  <path d="M1054 497 H 1096" stroke="#7A8699" stroke-width="1.4" marker-end="url(#arr)"/>

  <!-- ── COL 4 · TOOLS / RAG / DATA ── -->
  <text x="1100" y="40" font-size="11" font-weight="700" letter-spacing="1.8" fill="#7A8699">4 · TOOLS · RAG · DATA</text>

  <rect x="1100" y="54" width="304" height="156" rx="12" fill="#FFFFFF" stroke="#D9DEE6" stroke-width="1.4"/>
  <text x="1122" y="80" font-size="12.5" font-weight="700" fill="#1C2533">Tool chain</text>
  <text x="1122" y="97" font-size="10" fill="#5B6677">deterministic, typed calls per agent</text>
  <g font-family="'JetBrains Mono', Menlo, monospace" font-size="10" fill="#3D4A5C">
    <text x="1122" y="119">· KPI / metrics queries</text>
    <text x="1122" y="136">· gNB &amp; core element inspectors</text>
    <text x="1122" y="153">· alert &amp; event log search</text>
    <text x="1122" y="170">· policy / config readers</text>
    <text x="1122" y="187">· topology &amp; inventory lookups</text>
  </g>

  <rect x="1100" y="226" width="304" height="120" rx="12" fill="#FFFFFF" stroke="#D9DEE6" stroke-width="1.4"/>
  <text x="1122" y="252" font-size="12.5" font-weight="700" fill="#1C2533">RAG — knowledge grounding</text>
  <text x="1122" y="271" font-size="10" fill="#5B6677">retrieval over curated corpora keeps answers</text>
  <text x="1122" y="285" font-size="10" fill="#5B6677">grounded in this network's context</text>
  <text x="1122" y="308" font-size="10.5" fill="#3D4A5C">runbooks · manuals · past incidents</text>
  <text x="1122" y="326" font-size="10.5" fill="#3D4A5C">config baselines · 3GPP reference notes</text>

  <rect x="1100" y="362" width="304" height="120" rx="12" fill="#FFFFFF" stroke="#D9DEE6" stroke-width="1.4"/>
  <text x="1122" y="388" font-size="12.5" font-weight="700" fill="#1C2533">Live data planes</text>
  <text x="1122" y="410" font-size="10.5" fill="#3D4A5C">real-time telemetry · historical analytics</text>
  <text x="1122" y="428" font-size="10.5" fill="#3D4A5C">event &amp; audit logs · policy configuration</text>
  <text x="1122" y="446" font-size="10.5" fill="#3D4A5C">SIM / license inventory</text>
  <text x="1122" y="468" font-size="9.5" fill="#7A8699">read-only access in v1 workflows</text>

  <!-- ── RESPONSE STRIP ── -->
  <text x="36" y="652" font-size="11" font-weight="700" letter-spacing="1.8" fill="#7A8699">5 · STRUCTURED, AUDITABLE ANSWER</text>

  <rect x="36" y="666" width="1368" height="98" rx="14" fill="#F0FBF7" stroke="#9FE4CD" stroke-width="1.4"/>
  <g font-size="10.5" fill="#1C2533">
    <text x="64" y="694" font-size="11.5" font-weight="700" fill="#16735A">SUMMARY</text>
    <text x="64" y="714">Drop rate 8.6% in Zone C — handover failures</text>
    <text x="64" y="729">C02↔C03 + UPF timeouts on edge node 07.</text>
    <text x="64" y="750" font-size="10" font-weight="700" fill="#16735A">CONFIDENCE 0.82</text>

    <line x1="392" y1="684" x2="392" y2="748" stroke="#CBEFE0" stroke-width="1.4"/>
    <text x="420" y="694" font-size="11.5" font-weight="700" fill="#16735A">EVIDENCE — INLINE</text>
    <text x="420" y="714">drop-cause chart · per-zone KPI deltas ·</text>
    <text x="420" y="729">correlated log excerpts · per-agent findings</text>

    <line x1="724" y1="684" x2="724" y2="748" stroke="#CBEFE0" stroke-width="1.4"/>
    <text x="752" y="694" font-size="11.5" font-weight="700" fill="#16735A">NEXT-STEP ACTIONS</text>
    <text x="752" y="714">RF shielding review · fix handover params</text>
    <text x="752" y="729" font-size="10" font-weight="700" fill="#8A6116">WRITE ACTIONS REQUIRE HUMAN APPROVAL</text>

    <line x1="1056" y1="684" x2="1056" y2="748" stroke="#CBEFE0" stroke-width="1.4"/>
    <text x="1084" y="694" font-size="11.5" font-weight="700" fill="#16735A">AUDIT TRAIL</text>
    <text x="1084" y="714">every sub-task, agent call and decision</text>
    <text x="1084" y="729">recorded and replayable</text>
  </g>

  <!-- return arrows -->
  <path d="M514 600 V 662" stroke="#2BA98C" stroke-width="1.8" marker-end="url(#arrT)"/>
  <text x="526" y="636" font-size="10" font-weight="600" fill="#16735A">aggregate + correlate</text>
  <path d="M36 715 C 10 715 10 91 32 91" stroke="#2BA98C" stroke-width="1.8" fill="none" marker-end="url(#arrT)"/>
  <text x="20" y="560" font-size="10" font-weight="600" fill="#16735A" transform="rotate(-90 20 560)">answer returns to the conversation</text>
</svg>
