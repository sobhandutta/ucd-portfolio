<svg viewBox="0 0 1160 584" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>AI Judgment Framework — Behavior Specification</title>
  <desc>A design artifact showing four trigger conditions mapped to AI response patterns and language signals: high confidence read-only, low confidence, write actions, and model-reality conflicts.</desc>
  <defs>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
      .mono { font-family: 'Menlo', 'Consolas', monospace; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1160" height="584" fill="#0C0F18" rx="12"/>

  <!-- Header -->
  <rect width="1160" height="66" fill="#111623" rx="12"/>
  <rect y="54" width="1160" height="12" fill="#111623"/>
  <text x="40" y="26" class="mono" font-size="10" fill="#01BCF3" letter-spacing="0.1em" font-weight="500">BEHAVIOR SPECIFICATION · ATAYA AI ASSISTANT v2</text>
  <text x="40" y="48" font-size="14" fill="#C8CCE0" font-weight="600">Judgment Framework — when to act, when to ask, how to signal confidence</text>

  <!-- Column headers -->
  <text x="56" y="90" font-size="10" fill="#3D4560" font-weight="700" letter-spacing="0.09em">TRIGGER CONDITION</text>
  <text x="444" y="90" font-size="10" fill="#3D4560" font-weight="700" letter-spacing="0.09em">RESPONSE PATTERN</text>
  <text x="792" y="90" font-size="10" fill="#3D4560" font-weight="700" letter-spacing="0.09em">LANGUAGE SIGNAL</text>
  <line x1="40" y1="97" x2="1120" y2="97" stroke="#1A2035" stroke-width="1"/>
  <line x1="424" y1="66" x2="424" y2="500" stroke="#1A2035" stroke-width="1"/>
  <line x1="776" y1="66" x2="776" y2="500" stroke="#1A2035" stroke-width="1"/>

  <!-- ROW 1: High conf + read-only -->
  <rect x="0" y="98" width="1160" height="100" fill="#0E1320"/>
  <rect x="40" y="116" width="3" height="64" fill="#46D5B3" rx="1.5"/>
  <text x="56" y="137" font-size="12.5" fill="#D0D5E8" font-weight="600">High confidence · read-only analysis</text>
  <text x="56" y="156" font-size="11" fill="#5A6380">Confidence ≥ 0.80 · no system changes · data query only</text>
  <rect x="56" y="167" width="96" height="20" rx="10" fill="#46D5B3" fill-opacity="0.14"/>
  <text x="104" y="181" font-size="10" fill="#46D5B3" font-weight="600" text-anchor="middle">conf · 0.91</text>
  <text x="444" y="137" font-size="12.5" fill="#D0D5E8" font-weight="600">Execute autonomously → receipt</text>
  <text x="444" y="156" font-size="11" fill="#5A6380">Act on request · surface what / why / outcome</text>
  <rect x="444" y="167" width="100" height="20" rx="10" fill="#46D5B3" fill-opacity="0.12"/>
  <text x="494" y="181" font-size="10" fill="#46D5B3" font-weight="600" text-anchor="middle">autonomous</text>
  <rect x="792" y="110" width="316" height="74" rx="6" fill="#111623" stroke="#1A2035" stroke-width="1"/>
  <text x="808" y="132" font-size="11.5" fill="#C8CCE0">"Call drop rate is <tspan font-weight="700">8.6%</tspan> — 3.6 pts above threshold,</text>
  <text x="808" y="150" font-size="11.5" fill="#C8CCE0">isolated to Zone C."</text>
  <rect x="808" y="161" width="188" height="17" rx="8" fill="#46D5B3" fill-opacity="0.1"/>
  <text x="902" y="173" font-size="10" fill="#46D5B3" font-weight="500" text-anchor="middle">confident · direct · cites evidence</text>

  <!-- ROW 2: Low confidence -->
  <rect x="0" y="198" width="1160" height="100" fill="#0C0F18"/>
  <rect x="40" y="216" width="3" height="64" fill="#FFB800" rx="1.5"/>
  <text x="56" y="237" font-size="12.5" fill="#D0D5E8" font-weight="600">Low confidence · ambiguous scope</text>
  <text x="56" y="256" font-size="11" fill="#5A6380">Confidence &lt; 0.80 · unverifiable data · model-reality gap</text>
  <rect x="56" y="267" width="96" height="20" rx="10" fill="#FFB800" fill-opacity="0.14"/>
  <text x="104" y="281" font-size="10" fill="#FFB800" font-weight="600" text-anchor="middle">conf · 0.55</text>
  <text x="444" y="237" font-size="12.5" fill="#D0D5E8" font-weight="600">Surface recommendation + flag</text>
  <text x="444" y="256" font-size="11" fill="#5A6380">Name uncertainty · offer correction · await decision</text>
  <rect x="444" y="267" width="110" height="20" rx="10" fill="#FFB800" fill-opacity="0.12"/>
  <text x="499" y="281" font-size="10" fill="#FFB800" font-weight="600" text-anchor="middle">recommendation</text>
  <rect x="792" y="210" width="316" height="74" rx="6" fill="#111623" stroke="#1A2035" stroke-width="1"/>
  <text x="808" y="232" font-size="11.5" fill="#C8CCE0">"I couldn't verify <tspan font-weight="700">"Nat Off and DHCP On"</tspan> —</text>
  <text x="808" y="250" font-size="11.5" fill="#C8CCE0">closest match is <tspan font-weight="700">"NAT Off / DHCP On (Zone B)"</tspan>."</text>
  <rect x="808" y="261" width="220" height="17" rx="8" fill="#FFB800" fill-opacity="0.1"/>
  <text x="918" y="273" font-size="10" fill="#FFB800" font-weight="500" text-anchor="middle">explicit uncertainty · offers correction</text>

  <!-- ROW 3: Write action -->
  <rect x="0" y="298" width="1160" height="100" fill="#0E1320"/>
  <rect x="40" y="316" width="3" height="64" fill="#5B9BD5" rx="1.5"/>
  <text x="56" y="337" font-size="12.5" fill="#D0D5E8" font-weight="600">Write action · any confidence level</text>
  <text x="56" y="356" font-size="11" fill="#5A6380">Creates, modifies, or deletes system state</text>
  <rect x="56" y="367" width="96" height="20" rx="10" fill="#5B9BD5" fill-opacity="0.18"/>
  <text x="104" y="381" font-size="10" fill="#8BBDE8" font-weight="600" text-anchor="middle">write-gated</text>
  <text x="444" y="337" font-size="12.5" fill="#D0D5E8" font-weight="600">Preview form + approval gate</text>
  <text x="444" y="356" font-size="11" fill="#5A6380">Editable payload preview · explicit Continue / Cancel</text>
  <rect x="444" y="367" width="108" height="20" rx="10" fill="#5B9BD5" fill-opacity="0.15"/>
  <text x="498" y="381" font-size="10" fill="#8BBDE8" font-weight="600" text-anchor="middle">approval gate</text>
  <rect x="792" y="310" width="316" height="74" rx="6" fill="#111623" stroke="#1A2035" stroke-width="1"/>
  <text x="808" y="332" font-size="11.5" fill="#C8CCE0">"Fields are editable. Would you like to</text>
  <text x="808" y="350" font-size="11.5" fill="#C8CCE0"><tspan font-weight="700">Continue</tspan> or <tspan font-weight="700">Cancel</tspan>?"</text>
  <rect x="808" y="361" width="214" height="17" rx="8" fill="#5B9BD5" fill-opacity="0.12"/>
  <text x="915" y="373" font-size="10" fill="#8BBDE8" font-weight="500" text-anchor="middle">transparent · operator controls outcome</text>

  <!-- ROW 4: Model conflict -->
  <rect x="0" y="398" width="1160" height="100" fill="#0C0F18"/>
  <rect x="40" y="416" width="3" height="64" fill="#FF6B50" rx="1.5"/>
  <text x="56" y="437" font-size="12.5" fill="#D0D5E8" font-weight="600">Model conflicts with operator observation</text>
  <text x="56" y="456" font-size="11" fill="#5A6380">Telemetry disagrees with what the operator reports on the ground</text>
  <rect x="56" y="467" width="96" height="20" rx="10" fill="#FF6B50" fill-opacity="0.14"/>
  <text x="104" y="481" font-size="10" fill="#FF9080" font-weight="600" text-anchor="middle">edge case</text>
  <text x="444" y="437" font-size="12.5" fill="#D0D5E8" font-weight="600">Surface conflict → defer to operator</text>
  <text x="444" y="456" font-size="11" fill="#5A6380">Name the discrepancy · never override · escalate if needed</text>
  <rect x="444" y="467" width="108" height="20" rx="10" fill="#FF6B50" fill-opacity="0.12"/>
  <text x="498" y="481" font-size="10" fill="#FF9080" font-weight="600" text-anchor="middle">defer + escalate</text>
  <rect x="792" y="410" width="316" height="74" rx="6" fill="#111623" stroke="#1A2035" stroke-width="1"/>
  <text x="808" y="432" font-size="11.5" fill="#C8CCE0">"My data shows Zone C offline, but you're</text>
  <text x="808" y="450" font-size="11.5" fill="#C8CCE0">seeing it active — surfacing for your judgment."</text>
  <rect x="808" y="461" width="224" height="17" rx="8" fill="#FF6B50" fill-opacity="0.1"/>
  <text x="920" y="473" font-size="10" fill="#FF9080" font-weight="500" text-anchor="middle">surfaces conflict · defers to human</text>

  <!-- Footer -->
  <rect x="0" y="498" width="1160" height="86" fill="#111623"/>
  <rect x="0" y="498" width="1160" height="1" fill="#1A2035"/>
  <text x="40" y="522" class="mono" font-size="10" fill="#3D4560" letter-spacing="0.08em">DESIGN PRINCIPLE</text>
  <text x="40" y="546" font-size="12" fill="#5A6380">Read-only by default · write actions always gated · uncertainty always named · operator judgment always deferred to</text>
  <circle cx="41" cy="569" r="4" fill="#46D5B3"/>
  <text x="51" y="573" font-size="10.5" fill="#5A6380">High confidence ≥ 0.80</text>
  <circle cx="178" cy="569" r="4" fill="#FFB800"/>
  <text x="188" y="573" font-size="10.5" fill="#5A6380">Low confidence</text>
  <circle cx="285" cy="569" r="4" fill="#5B9BD5"/>
  <text x="295" y="573" font-size="10.5" fill="#5A6380">Write-gated (any confidence)</text>
  <circle cx="457" cy="569" r="4" fill="#FF6B50"/>
  <text x="467" y="573" font-size="10.5" fill="#5A6380">Model-reality conflict</text>
  <text x="1120" y="548" font-size="11" fill="#252D42" text-anchor="end" font-weight="700" letter-spacing="0.06em">ATAYA</text>
  <text x="1120" y="564" class="mono" font-size="9" fill="#252D42" text-anchor="end" letter-spacing="0.04em">CHORUS DESIGN SYSTEM</text>
</svg>
