<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&family=Work+Sans:wght@500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: "Roboto", sans-serif; background: #F4F7F9; padding: 20px; }
  .section-label { font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: #6A6F81; margin: 16px 0 10px; }
  .section-label:first-child { margin-top: 0; }
  .token-row { display: flex; align-items: center; gap: 12px; margin-bottom: 7px; }
  .token-bar { background: #125695; border-radius: 2px; height: 12px; }
  .token-name { font-size: 11px; font-weight: 600; color: #394463; width: 80px; flex-shrink: 0; }
  .token-val { font-size: 10px; color: #6A6F81; font-family: monospace; }
  .radii-row { display: flex; gap: 14px; flex-wrap: wrap; }
  .radius-demo { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .radius-box { width: 44px; height: 36px; background: #125695; }
  .radius-label { font-size: 10px; color: #394463; font-weight: 600; }
  .radius-val { font-size: 9px; color: #6A6F81; font-family: monospace; }
  .shadow-row { display: flex; gap: 14px; flex-wrap: wrap; margin-top: 4px; }
  .shadow-box { width: 90px; height: 48px; background: #fff; display: flex; align-items: center; justify-content: center; border-radius: 6px; }
  .shadow-label { font-size: 10px; color: #394463; font-weight: 600; margin-top: 5px; text-align: center; }
  .shadow-item { display: flex; flex-direction: column; align-items: center; }
</style>
</head>
<body>
  <div class="section-label">Spacing Scale</div>
  <div class="token-row"><div class="token-name">space-1</div><div class="token-bar" style="width:4px;"></div><div class="token-val">4px</div></div>
  <div class="token-row"><div class="token-name">space-2</div><div class="token-bar" style="width:8px;"></div><div class="token-val">8px</div></div>
  <div class="token-row"><div class="token-name">space-3</div><div class="token-bar" style="width:12px;"></div><div class="token-val">12px</div></div>
  <div class="token-row"><div class="token-name">space-4</div><div class="token-bar" style="width:16px;"></div><div class="token-val">16px</div></div>
  <div class="token-row"><div class="token-name">space-5</div><div class="token-bar" style="width:20px;"></div><div class="token-val">20px</div></div>
  <div class="token-row"><div class="token-name">space-6</div><div class="token-bar" style="width:24px;"></div><div class="token-val">24px</div></div>
  <div class="token-row"><div class="token-name">space-8</div><div class="token-bar" style="width:32px;"></div><div class="token-val">32px</div></div>
  <div class="token-row"><div class="token-name">space-10</div><div class="token-bar" style="width:40px;"></div><div class="token-val">40px</div></div>

  <div class="section-label">Border Radius</div>
  <div class="radii-row">
    <div class="radius-demo"><div class="radius-box" style="border-radius:0;"></div><div class="radius-label">None</div><div class="radius-val">0</div></div>
    <div class="radius-demo"><div class="radius-box" style="border-radius:4px;"></div><div class="radius-label">sm</div><div class="radius-val">4px</div></div>
    <div class="radius-demo"><div class="radius-box" style="border-radius:6px;"></div><div class="radius-label">md</div><div class="radius-val">6px</div></div>
    <div class="radius-demo"><div class="radius-box" style="border-radius:10px;"></div><div class="radius-label">lg</div><div class="radius-val">10px</div></div>
    <div class="radius-demo"><div class="radius-box" style="border-radius:16px;"></div><div class="radius-label">full</div><div class="radius-val">16px</div></div>
    <div class="radius-demo"><div class="radius-box" style="border-radius:50%;width:36px;height:36px;"></div><div class="radius-label">circle</div><div class="radius-val">50%</div></div>
  </div>

  <div class="section-label">Shadows</div>
  <div class="shadow-row">
    <div class="shadow-item">
      <div class="shadow-box" style="box-shadow:0px 0px 22px 0.05px #EFEFEF;border:1px solid #E2EAF4;"></div>
      <div class="shadow-label">Card</div>
    </div>
    <div class="shadow-item">
      <div class="shadow-box" style="box-shadow:0px 5px 25px rgba(1,188,243,0.2);border:1px solid #E2EAF4;"></div>
      <div class="shadow-label">Card Hover</div>
    </div>
    <div class="shadow-item">
      <div class="shadow-box" style="box-shadow:0px 0px 28px 0.4px rgba(26,138,250,0.4);border:1px solid #E2EAF4;"></div>
      <div class="shadow-label">Header Glow</div>
    </div>
    <div class="shadow-item">
      <div class="shadow-box" style="box-shadow:-6px 0 20px rgba(38,111,226,0.15);border:1px solid #E2EAF4;"></div>
      <div class="shadow-label">Drawer</div>
    </div>
  </div>
</body>
</html>
