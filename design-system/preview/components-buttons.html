<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=Work+Sans:wght@500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: "Roboto", sans-serif; background: #F4F7F9; padding: 20px 24px; }
  .section-label { font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: #6A6F81; margin: 16px 0 10px; }
  .section-label:first-child { margin-top: 0; }
  .row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  /* Base button */
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    border-radius: 6px; font-size: 14px; font-weight: 700;
    height: 40px; padding: 0 20px; cursor: pointer; border: none;
    letter-spacing: -0.01em; transition: background 0.15s, box-shadow 0.15s;
    font-family: "Roboto", sans-serif;
  }
  .btn-primary {
    background: #125695; color: #fff;
    filter: drop-shadow(0px 4px 4px rgba(26,138,250,0.1));
  }
  .btn-primary:hover { background: #FFB82C; }
  .btn-secondary {
    background: #E5E5E5; color: #125695; border: none;
  }
  .btn-secondary:hover { background: #4F4F5E; color: #FFB82C; }
  .btn-outline {
    background: transparent; color: #125695;
    border: 1px solid #125695;
  }
  .btn-danger {
    background: transparent; color: #FF4930;
    border: 1px solid #FF4930;
  }
  .btn-danger:hover { background: #F45858; color: #fff; }
  .btn-link {
    background: none; border: none; color: #125695;
    font-weight: 400; padding: 0; height: auto; filter: none;
    text-decoration: underline; text-underline-offset: 2px;
  }
  .btn-ghost {
    background: rgba(0,0,0,0.02); color: #141414;
    border: none;
  }
  .btn-disabled {
    background: #F4F7F9; color: #D3D3D3;
    border: 1px solid #E2EAF4; cursor: not-allowed;
    filter: none;
  }
  .btn-sm { height: 32px; padding: 0 14px; font-size: 12px; font-weight: 500; }
  .btn-icon {
    width: 32px; height: 32px; padding: 0; border-radius: 16px;
    background: rgba(0,0,0,0.02); border: none; color: #141414;
    display: inline-flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 14px;
  }
  .btn-cyan {
    background: #01BCF3; color: #fff; border: none;
    filter: drop-shadow(0px 4px 4px rgba(26,138,250,0.1));
  }
</style>
</head>
<body>
  <div class="section-label">Primary Actions</div>
  <div class="row">
    <button class="btn btn-primary">Add Network</button>
    <button class="btn btn-primary btn-cyan">Start Services</button>
    <button class="btn btn-secondary">Cancel</button>
    <button class="btn btn-outline">Configure</button>
    <button class="btn btn-disabled" disabled>Disabled</button>
  </div>

  <div class="section-label">Destructive &amp; Ghost</div>
  <div class="row">
    <button class="btn btn-danger">Delete</button>
    <button class="btn btn-link">View Details</button>
    <button class="btn btn-ghost">Export CSV</button>
    <button class="btn btn-sm btn-primary">+ Add</button>
    <button class="btn btn-sm btn-secondary">Edit</button>
    <button class="btn-icon">⋮</button>
    <button class="btn-icon">✕</button>
  </div>

  <div class="section-label">Option / Selector Buttons</div>
  <div class="row">
    <button style="display:inline-block;background:#E5E5E5;border:1px solid #125695;border-radius:4px;min-width:150px;height:45px;padding:5px 10px 0 30px;font-size:14px;cursor:pointer;position:relative;color:#125695;font-family:Roboto,sans-serif;">
      <span style="position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:14px;">📡</span>
      <div style="font-size:11px;color:#394463;position:absolute;left:30px;top:5px;">Type</div>
      <b style="position:absolute;left:30px;top:22px;font-weight:normal;">5G NR</b>
    </button>
    <button style="display:inline-block;background:#E5E5E5;border:1px solid #125695;border-radius:4px;min-width:150px;height:45px;padding:5px 10px 0 30px;font-size:14px;cursor:pointer;position:relative;color:#125695;font-family:Roboto,sans-serif;">
      <span style="position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:14px;">🏢</span>
      <div style="font-size:11px;color:#394463;position:absolute;left:30px;top:5px;">Location</div>
      <b style="position:absolute;left:30px;top:22px;font-weight:normal;">Tokyo HQ</b>
    </button>
  </div>
</body>
</html>
