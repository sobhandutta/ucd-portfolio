<style>

<body>
<div class="w">

  <defs>
    <style>

    <pattern id="dots" x="0" y="0" width="16" height="16" patternUnits="userSpaceOnUse">

  <!-- ── BACKGROUND ── -->
  <rect width="1160" height="462" fill="#0C0F18" rx="12"/>

  <!-- ── HEADER ── -->
  <rect width="1160" height="64" fill="#111623" rx="12"/>
  <rect y="54" width="1160" height="10" fill="#111623"/>
  <text x="40" y="26" class="mono" font-size="10" fill="#01BCF3" letter-spacing="0.1em" font-weight="500">TIMELINE COMPARISON · ATAYA CHORUS DESIGN PROCESS</text>
  <text x="40" y="48" font-size="13.5" fill="#C8CCE0" font-weight="600">Traditional 6-week UX cycle vs. AI-native 5-day sprint — same phases, radically compressed</text>

  <text x="595" y="86" text-anchor="middle" class="mono" font-size="9" fill="#2A3A54" letter-spacing="0.07em">WEEK 3</text>
  <text x="745" y="86" text-anchor="middle" class="mono" font-size="9" fill="#2A3A54" letter-spacing="0.07em">WEEK 4</text>
  <text x="895" y="86" text-anchor="middle" class="mono" font-size="9" fill="#2A3A54" letter-spacing="0.07em">WEEK 5</text>
  <text x="1045" y="86" text-anchor="middle" class="mono" font-size="9" fill="#2A3A54" letter-spacing="0.07em">WEEK 6</text>

  <!-- ── OLD BAR (y=92..150, h=58) ── -->
  <text x="40" y="107" class="mono" font-size="9" fill="#2A3550" letter-spacing="0.08em">BEFORE</text>
  <text x="40" y="132" font-size="24" fill="#344460" font-weight="700">6</text>
  <text x="66" y="130" font-size="11" fill="#2A3A50" font-weight="500">weeks</text>

  <!-- Ph1: Kick-off 2d → x=220..280 -->
  <rect x="220" y="92" width="60" height="58" fill="#101B2E"/>
  <rect x="220" y="92" width="60" height="3" fill="#3A5888"/>
  <text x="250" y="118" text-anchor="middle" font-size="8.5" fill="#2E4068" font-weight="600">Kick-off</text>
  <text x="250" y="133" text-anchor="middle" font-size="7.5" fill="#1E2E48">2 days</text>

  <!-- Ph2: Research 8d → x=281..520 (ends at wk2 boundary) -->
  <rect x="281" y="92" width="238" height="58" fill="#0D1626"/>

  <!-- Ph5: Testing 5d → x=821..970 (ends at wk5 boundary) -->
  <rect x="821" y="92" width="149" height="58" fill="#181208"/>
  <rect x="821" y="92" width="149" height="3" fill="#684818"/>
  <text x="895" y="118" text-anchor="middle" font-size="9.5" fill="#483820" font-weight="600">User testing</text>
  <text x="895" y="133" text-anchor="middle" font-size="7.5" fill="#302A10">5 days</text>

  <!-- Ph6: Handoff 5d → x=971..1120 -->
  <rect x="971" y="92" width="149" height="58" fill="#0C1A0E"/>
  <rect x="971" y="92" width="149" height="3" fill="#165830"/>

  <line x1="280" y1="92" x2="280" y2="150" stroke="#0C0F18" stroke-width="1.5"/>

  <!-- Duration bracket -->
  <line x1="220" y1="157" x2="1120" y2="157" stroke="#1A2538" stroke-width="0.75"/>
  <line x1="220" y1="154" x2="220" y2="160" stroke="#1A2538" stroke-width="1"/>
  <line x1="1120" y1="154" x2="1120" y2="160" stroke="#1A2538" stroke-width="1"/>
  <text x="670" y="169" text-anchor="middle" class="mono" font-size="9" fill="#1E2E42" letter-spacing="0.06em">30 WORKING DAYS</text>

  <!-- ── NEW BAR SECTION ── -->

  <!-- Week 1 highlight behind new bar -->
  <rect x="219" y="179" width="152" height="60" fill="#041420" rx="3"/>
  <rect x="219" y="179" width="152" height="60" fill="none" stroke="#01BCF3" stroke-width="0.75" rx="3" opacity="0.4"/>

  <!-- Reclaimed zone: dotted fill + label -->
  <rect x="371" y="184" width="749" height="46" fill="url(#dots)"/>
  <text x="745" y="210" text-anchor="middle" class="mono" font-size="9.5" fill="#1A2A3C" letter-spacing="0.07em">25 WORKING DAYS RECLAIMED</text>

  <!-- Row label -->
  <text x="40" y="200" class="mono" font-size="9" fill="#01BCF3" letter-spacing="0.08em">AFTER</text>
  <text x="40" y="226" font-size="24" fill="#01BCF3" font-weight="700">5</text>
  <text x="66" y="222" font-size="11" fill="#3A8898" font-weight="500">days</text>

  <!-- NEW BAR phases (y=184..230, h=46) -->
  <!-- Day 1: Research + AI synthesis x=220..250 -->
  <rect x="220" y="184" width="30" height="46" fill="#003C58"/>
  <rect x="220" y="184" width="30" height="3" fill="#01BCF3"/>
  <!-- Day 2: Concept x=250..280 -->
  <rect x="250" y="184" width="30" height="46" fill="#124838"/>
  <rect x="250" y="184" width="30" height="3" fill="#46D5B3"/>
  <!-- Day 3: Prototype x=280..310 -->
  <rect x="280" y="184" width="30" height="46" fill="#0A2240"/>
  <rect x="280" y="184" width="30" height="3" fill="#5B9BD5"/>
  <!-- Day 4: Test x=310..340 -->
  <rect x="310" y="184" width="30" height="46" fill="#382400"/>
  <rect x="310" y="184" width="30" height="3" fill="#FFB800"/>
  <!-- Day 5: Ship x=340..370 -->
  <rect x="340" y="184" width="30" height="46" fill="#124838"/>
  <rect x="340" y="184" width="30" height="3" fill="#46D5B3"/>

  <!-- Phase labels -->
  <text x="235" y="243" text-anchor="middle" font-size="7.5" fill="#01BCF3" font-weight="600">Rsch</text>
  <text x="265" y="243" text-anchor="middle" font-size="7.5" fill="#46D5B3" font-weight="600">Idea</text>
  <text x="295" y="243" text-anchor="middle" font-size="7.5" fill="#5B9BD5" font-weight="600">Proto</text>
  <text x="325" y="243" text-anchor="middle" font-size="7.5" fill="#FFB800" font-weight="600">Test</text>
  <text x="355" y="243" text-anchor="middle" font-size="7.5" fill="#46D5B3" font-weight="600">Ship</text>

  <!-- "Fits in Week 1" call-out -->
  <text x="435" y="202" font-size="11" fill="#1A2C3C" font-style="italic">The entire AI-native cycle fits inside Week 1</text>

  <!-- New bar duration bracket -->
  <line x1="220" y1="251" x2="370" y2="251" stroke="#2A4A5A" stroke-width="0.75"/>
  <line x1="220" y1="248" x2="220" y2="254" stroke="#2A4A5A" stroke-width="1"/>
  <line x1="370" y1="248" x2="370" y2="254" stroke="#2A4A5A" stroke-width="1"/>
  <text x="295" y="263" text-anchor="middle" class="mono" font-size="8" fill="#1E3848" letter-spacing="0.05em">5 DAYS</text>

  <!-- ── METRICS ── -->
  <line x1="0" y1="276" x2="1160" y2="276" stroke="#141E2E" stroke-width="1"/>

  <text x="220" y="325" font-size="46" fill="#01BCF3" font-weight="700">6×</text>
  <text x="220" y="347" font-size="11.5" fill="#3A4E66">faster end-to-end</text>

  <text x="400" y="325" font-size="46" fill="#46D5B3" font-weight="700">83%</text>
  <text x="400" y="347" font-size="11.5" fill="#3A4E66">time reduction</text>

  <text x="608" y="316" font-size="15" fill="#C8CCE0" font-weight="700">Day 1</text>
  <text x="608" y="336" font-size="11" fill="#3A4E66">complete research synthesis</text>
  <text x="608" y="351" font-size="10.5" fill="#2A3A50">(was: 10 days)</text>

  <text x="820" y="293" class="mono" font-size="9" fill="#1E2E44" letter-spacing="0.08em">WHAT AI REPLACED, NOT CUT</text>
  <text x="820" y="314" font-size="11" fill="#2A3C54">·  Research: 10 days → AI-assisted synthesis in hours</text>
  <text x="820" y="331" font-size="11" fill="#2A3C54">·  Synthesis: 4 days → structured output, same day</text>
  <text x="820" y="348" font-size="11" fill="#2A3C54">·  Phases collapsed into each other — not removed</text>

  <!-- ── FOOTER ── -->
  <rect x="0" y="366" width="1160" height="96" fill="#111623"/>
  <rect x="0" y="366" width="1160" height="1" fill="#141E2E"/>

  <text x="40" y="388" class="mono" font-size="9" fill="#1E2A3E" letter-spacing="0.08em">AI-NATIVE PHASES</text>

  <rect x="40" y="397" width="10" height="10" rx="2" fill="#003C58"/>
  <rect x="40" y="397" width="10" height="2.5" fill="#01BCF3"/>
  <text x="56" y="407" font-size="10" fill="#3A4E68">Day 1 · Research + AI synthesis</text>

  <rect x="230" y="397" width="10" height="10" rx="2" fill="#124838"/>
  <rect x="230" y="397" width="10" height="2.5" fill="#46D5B3"/>
  <text x="246" y="407" font-size="10" fill="#3A4E68">Day 2 · Concept generation</text>

  <rect x="415" y="397" width="10" height="10" rx="2" fill="#0A2240"/>
  <rect x="415" y="397" width="10" height="2.5" fill="#5B9BD5"/>
  <text x="431" y="407" font-size="10" fill="#3A4E68">Day 3 · Prototype</text>

  <rect x="572" y="397" width="10" height="10" rx="2" fill="#382400"/>
  <rect x="572" y="397" width="10" height="2.5" fill="#FFB800"/>
  <text x="588" y="407" font-size="10" fill="#3A4E68">Day 4 · User testing</text>

  <rect x="723" y="397" width="10" height="10" rx="2" fill="#124838"/>
  <rect x="723" y="397" width="10" height="2.5" fill="#46D5B3"/>
  <text x="739" y="407" font-size="10" fill="#3A4E68">Day 5 · Handoff</text>

  <text x="40" y="434" font-size="10.5" fill="#1E2E44">Phases are compressed, not skipped — AI handles synthesis so the designer focuses on judgment and direction, not production.</text>
  <text x="40" y="451" font-size="10.5" fill="#1E2E44">The traditional cycle was slow because of scheduling, handoffs, and manual synthesis — not because designers were slow.</text>

  <text x="1120" y="428" text-anchor="end" font-size="11" fill="#1A2438" font-weight="700" letter-spacing="0.06em">ATAYA</text>
  <text x="1120" y="444" text-anchor="end" class="mono" font-size="9" fill="#1A2438" letter-spacing="0.04em">CHORUS</text>
