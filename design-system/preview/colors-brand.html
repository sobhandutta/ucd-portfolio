<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: "Work Sans", "Roboto", sans-serif; background: #F4F7F9; padding: 20px; }
  .row { display: flex; gap: 10px; flex-wrap: wrap; }
  .swatch { flex: 1; min-width: 90px; }
  .swatch-block { height: 64px; border-radius: 6px; margin-bottom: 6px; }
  .swatch-name { font-size: 11px; font-weight: 600; color: #394463; letter-spacing: 0; }
  .swatch-hex  { font-size: 10px; color: #6A6F81; font-family: "Menlo", monospace; }
  .section-label { font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: #6A6F81; margin: 16px 0 8px; }
</style>
</head>
<body>
<div class="section-label">Brand / Primary</div>
<div class="row">
  <div class="swatch">
    <div class="swatch-block" style="background:#125695;"></div>
    <div class="swatch-name">Brand Blue</div>
    <div class="swatch-hex">#125695</div>
  </div>
  <div class="swatch">
    <div class="swatch-block" style="background:#126E95;"></div>
    <div class="swatch-name">Sidebar Blue</div>
    <div class="swatch-hex">#126E95</div>
  </div>
  <div class="swatch">
    <div class="swatch-block" style="background:#1A8AFA;"></div>
    <div class="swatch-name">Link Blue</div>
    <div class="swatch-hex">#1A8AFA</div>
  </div>
  <div class="swatch">
    <div class="swatch-block" style="background:#01BCF3;"></div>
    <div class="swatch-name">Cyan</div>
    <div class="swatch-hex">#01BCF3</div>
  </div>
  <div class="swatch">
    <div class="swatch-block" style="background:#46D5B3;"></div>
    <div class="swatch-name">Teal (Accent)</div>
    <div class="swatch-hex">#46D5B3</div>
  </div>
  <div class="swatch">
    <div class="swatch-block" style="background:#C0E5F4;"></div>
    <div class="swatch-name">Cyan Light</div>
    <div class="swatch-hex">#C0E5F4</div>
  </div>
</div>

<div class="section-label">Hover / Active States</div>
<div class="row">
  <div class="swatch">
    <div class="swatch-block" style="background:#FFB82C;"></div>
    <div class="swatch-name">Button Hover</div>
    <div class="swatch-hex">#FFB82C</div>
  </div>
  <div class="swatch">
    <div class="swatch-block" style="background:#4F4F5E; border:1px solid #ddd;"></div>
    <div class="swatch-name">Secondary Hover</div>
    <div class="swatch-hex">#4F4F5E</div>
  </div>
  <div class="swatch">
    <div class="swatch-block" style="background:#A5D750;"></div>
    <div class="swatch-name">Alt Success</div>
    <div class="swatch-hex">#A5D750</div>
  </div>
  <div class="swatch">
    <div class="swatch-block" style="background:#48A6F6;"></div>
    <div class="swatch-name">Info Blue</div>
    <div class="swatch-hex">#48A6F6</div>
  </div>
  <div class="swatch">
    <div class="swatch-block" style="background:#BDCde2; border:1px solid #ccc;"></div>
    <div class="swatch-name">Border Blue</div>
    <div class="swatch-hex">#BDCDE2</div>
  </div>
</div>
</body>
</html>
