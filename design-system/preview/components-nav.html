<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&family=Work+Sans:wght@500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: "Roboto", sans-serif; background: #F4F7F9; }

  /* Top header */
  .header {
    background: #000; height: 52px; display: flex; align-items: center;
    padding: 0 20px; justify-content: space-between;
  }
  .header-logo { display: flex; align-items: center; gap: 10px; }
  .logo-text { font-family: "Work Sans", sans-serif; font-weight: 700; font-size: 18px; color: #fff; letter-spacing: 0.04em; }
  .header-nav { display: flex; align-items: center; gap: 2px; }
  .nav-item {
    display: flex; align-items: center; gap: 6px; padding: 0 14px;
    height: 52px; font-size: 13px; color: #9BA3B7; cursor: pointer;
    position: relative; transition: color 0.15s; white-space: nowrap;
  }
  .nav-item:hover { color: #fff; }
  .nav-item.active { color: #fff; }
  .nav-item.active::after {
    content: ''; position: absolute; bottom: 0; left: 0; right: 0;
    height: 3px; background: #01BCF3; border-radius: 2px 2px 0 0;
  }
  .nav-item-icon { width: 14px; height: 14px; opacity: 0.7; }
  .header-actions { display: flex; align-items: center; gap: 12px; }
  .upgrade-badge {
    display: flex; align-items: center; gap: 6px; padding: 5px 10px;
    background: transparent; border: 1px solid #01BCF3; border-radius: 16px;
    font-size: 11px; color: #01BCF3; cursor: pointer;
  }
  .avatar { width: 28px; height: 28px; border-radius: 50%; background: #126E95; display: flex; align-items: center; justify-content: center; font-size: 11px; color: #fff; font-weight: 600; }

  /* Side nav */
  .layout { display: flex; }
  .sidebar {
    width: 200px; background: #126E95; display: flex; flex-direction: column;
    padding: 10px 0; min-height: 200px;
  }
  .side-item {
    display: flex; align-items: center; gap: 10px; padding: 9px 16px;
    font-size: 13px; color: rgba(255,255,255,0.75); cursor: pointer;
    transition: background 0.12s; position: relative;
  }
  .side-item:hover { background: rgba(255,255,255,0.08); color: #fff; }
  .side-item.active { background: rgba(1,188,243,0.25); color: #fff; }
  .side-item.active::before {
    content: ''; position: absolute; left: 0; top: 4px; bottom: 4px;
    width: 3px; background: #46D5B3; border-radius: 0 2px 2px 0;
  }
  .side-icon { width: 15px; height: 15px; opacity: 0.85; flex-shrink: 0; }
  .side-divider { height: 1px; background: rgba(255,255,255,0.12); margin: 8px 12px; }
  .side-label { font-size: 9px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: rgba(255,255,255,0.4); padding: 6px 16px 3px; }

  .section-label { font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: #6A6F81; padding: 14px 16px 8px; }
</style>
</head>
<body>
  <div class="section-label" style="padding-top:0;">Top Header</div>
  <div class="header">
    <div class="header-logo">
      <img src="../assets/atayalan_logo_white.svg" alt="Ataya" style="height:18px;" onerror="this.style.display='none'">
      <span class="logo-text">ATAYA</span>
    </div>
    <div class="header-nav">
      <div class="nav-item">
        <svg class="nav-item-icon" viewBox="0 0 16 16" fill="currentColor"><path d="M2 4h12v1.5H2zm0 3h8v1.5H2zm0 3h10v1.5H2z"/></svg>
        Insight &amp; Analytics
      </div>
      <div class="nav-item active">
        <svg class="nav-item-icon" viewBox="0 0 16 16" fill="currentColor"><path d="M8 1a7 7 0 1 0 0 14A7 7 0 0 0 8 1zm0 2a5 5 0 1 1 0 10A5 5 0 0 1 8 3z"/></svg>
        Networks
      </div>
      <div class="nav-item">Clients &amp; Policies</div>
      <div class="nav-item">Edge Application</div>
      <div class="nav-item">Organization</div>
    </div>
    <div class="header-actions">
      <div class="upgrade-badge">
        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="18 15 12 9 6 15"/></svg>
        Upgrade to v1.6.599
      </div>
      <div class="avatar">JD</div>
    </div>
  </div>

  <div class="section-label">Left Sidebar</div>
  <div class="layout">
    <div class="sidebar">
      <div class="side-label">Navigation</div>
      <div class="side-item">
        <img class="side-icon" src="../assets/icons/dashboard.svg" onerror="this.outerHTML='<span style=width:15px;height:15px;display:inline-block;background:rgba(255,255,255,0.5);border-radius:2px;></span>'">
        Overview
      </div>
      <div class="side-item active">
        <img class="side-icon" src="../assets/icons/network.svg" onerror="this.outerHTML='<span style=width:15px;height:15px;display:inline-block;background:rgba(255,255,255,0.8);border-radius:2px;></span>'">
        Network Overview
      </div>
      <div class="side-item">
        <img class="side-icon" src="../assets/icons/radio.svg" onerror="this.outerHTML='<span></span>'">
        RAN Management
      </div>
      <div class="side-item">
        <img class="side-icon" src="../assets/icons/client.svg" onerror="this.outerHTML='<span></span>'">
        Clients
      </div>
      <div class="side-item">
        <img class="side-icon" src="../assets/icons/policy.svg" onerror="this.outerHTML='<span></span>'">
        Policies
      </div>
      <div class="side-divider"></div>
      <div class="side-item">
        <img class="side-icon" src="../assets/icons/analytic.svg" onerror="this.outerHTML='<span></span>'">
        Analytics
      </div>
      <div class="side-item">
        <img class="side-icon" src="../assets/icons/setting.svg" onerror="this.outerHTML='<span></span>'">
        Settings
      </div>
    </div>
    <div style="flex:1;background:#fff;border:1px solid #E2EAF4;border-left:none;padding:16px;display:flex;align-items:flex-start;justify-content:flex-start;">
      <div style="font-size:12px;color:#6A6F81;">Content area — 228px sidebar, white content bg, top nav black</div>
    </div>
  </div>
</body>
</html>
