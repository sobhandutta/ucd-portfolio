<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ataya Harmony — Chorus UI Kit</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="tokens.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: "Roboto", "Work Sans", sans-serif; overflow: hidden; }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: #F4F7F9; }
  ::-webkit-scrollbar-thumb { background: #D3D3D3; border-radius: 3px; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="AppShell.jsx"></script>
<script type="text/babel" src="NetworkDashboard.jsx"></script>
<script type="text/babel" src="DeviceList.jsx"></script>
<script type="text/babel" src="FormDrawer.jsx"></script>
<script type="text/babel" src="LoginScreen.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;

// ── Tenant List Screen ──────────────────────────────────────────────────────
function TenantList() {
  const tenants = [
    { name: 'Tokyo Corp',    id: 'TEN-001', devices: 4, status: 'up',      plan: 'Enterprise' },
    { name: 'Osaka Mobile',  id: 'TEN-002', devices: 2, status: 'down',    plan: 'Standard' },
    { name: 'Kyoto Net',     id: 'TEN-003', devices: 1, status: 'standby', plan: 'Standard' },
    { name: 'North 5G',      id: 'TEN-004', devices: 3, status: 'up',      plan: 'Enterprise' },
    { name: 'Seoul Networks',id: 'TEN-005', devices: 6, status: 'up',      plan: 'Enterprise Plus' },
  ];
  return (
    <div>
      <PageHeader
        title="Tenants"
        breadcrumb={['Organization', 'Tenants']}
        actions={<Btn variant="primary" size="sm">+ Invite Tenant</Btn>}
      />
      <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
        {tenants.map((t, i) => (
          <div key={i} style={{
            background: '#fff', border: `1px solid ${COLORS.borderLight}`,
            borderRadius: RADIUS.sm, padding: '14px 18px',
            boxShadow: SHADOWS.card, display: 'flex', alignItems: 'center',
            justifyContent: 'space-between', cursor: 'pointer',
            transition: 'box-shadow 0.15s',
          }}
          onMouseEnter={e => e.currentTarget.style.boxShadow = SHADOWS.cardHover}
          onMouseLeave={e => e.currentTarget.style.boxShadow = SHADOWS.card}
          >
            <div style={{ display: 'flex', alignItems: 'center', gap: 14 }}>
              <div style={{
                width: 36, height: 36, borderRadius: RADIUS.md,
                background: `${COLORS.sidebarBlue}18`,
                display: 'flex', alignItems: 'center', justifyContent: 'center',
                fontSize: 14, fontWeight: 700, color: COLORS.sidebarBlue,
              }}>{t.name.charAt(0)}</div>
              <div>
                <div style={{ fontSize: 14, fontWeight: 500, color: COLORS.textPrimary }}>{t.name}</div>
                <div style={{ fontSize: 11, color: COLORS.textMuted, marginTop: 2, fontFamily: FONTS.mono }}>{t.id}</div>
              </div>
            </div>
            <div style={{ display: 'flex', alignItems: 'center', gap: 24 }}>
              <div style={{ textAlign: 'center' }}>
                <div style={{ fontSize: 18, fontWeight: 600, color: COLORS.textPrimary }}>{t.devices}</div>
                <div style={{ fontSize: 11, color: COLORS.textMuted }}>Devices</div>
              </div>
              <div style={{ textAlign: 'center' }}>
                <div style={{ fontSize: 12, color: COLORS.textSecondary, marginBottom: 3 }}>{t.plan}</div>
                <Badge status={t.status} label={t.status.charAt(0).toUpperCase() + t.status.slice(1)} />
              </div>
              <button style={{ background: 'none', border: 'none', cursor: 'pointer', color: COLORS.textMuted, fontSize: 18 }}>⋮</button>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── Analytics Screen ─────────────────────────────────────────────────────────
function AnalyticsScreen() {
  const kpis = [
    { label: 'Active Devices', value: '14', delta: '+2', up: true },
    { label: 'Total Tenants',  value: '5',  delta: '+1', up: true },
    { label: 'Network Uptime', value: '99.2%', delta: '-0.1%', up: false },
    { label: 'Avg Throughput', value: '1.2 Gbps', delta: '+0.3', up: true },
  ];
  return (
    <div>
      <PageHeader title="Insight & Analytics" breadcrumb={['Analytics']} />
      {/* KPI row */}
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4,1fr)', gap: 12, marginBottom: 20 }}>
        {kpis.map((k, i) => (
          <div key={i} style={{
            background: '#fff', border: `1px solid ${COLORS.borderLight}`,
            borderRadius: RADIUS.sm, padding: '14px 16px', boxShadow: SHADOWS.card,
          }}>
            <div style={{ fontSize: 11, color: COLORS.textMuted, fontWeight: 500, marginBottom: 8, textTransform: 'uppercase', letterSpacing: '0.04em' }}>{k.label}</div>
            <div style={{ fontSize: 26, fontWeight: 600, color: COLORS.textPrimary, lineHeight: 1 }}>{k.value}</div>
            <div style={{ fontSize: 11, color: k.up ? COLORS.teal : COLORS.error, marginTop: 6, fontWeight: 500 }}>
              {k.up ? '▲' : '▼'} {k.delta} vs last week
            </div>
          </div>
        ))}
      </div>
      {/* Chart placeholder */}
      <div style={{
        background: '#fff', border: `1px solid ${COLORS.borderLight}`,
        borderRadius: RADIUS.sm, padding: '16px 20px', boxShadow: SHADOWS.card,
      }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 14 }}>
          <div style={{ fontSize: 11, fontWeight: 700, color: COLORS.textSecondary, letterSpacing: '0.04em', textTransform: 'uppercase' }}>Network Traffic — 7 Days</div>
          <div style={{ display: 'flex', gap: 6 }}>
            {['1D','7D','30D'].map((p,i) => (
              <button key={p} style={{
                padding: '3px 10px', borderRadius: 4, border: `1px solid ${i===1?COLORS.brandBlue:COLORS.border}`,
                background: i===1?COLORS.brandBlue:'transparent', color: i===1?'#fff':COLORS.textMuted,
                fontSize: 11, cursor: 'pointer', fontFamily: FONTS.ui,
              }}>{p}</button>
            ))}
          </div>
        </div>
        {/* SVG chart */}
        <svg viewBox="0 0 640 140" style={{ width: '100%', height: 140 }}>
          <defs>
            <linearGradient id="g1" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stopColor="#46D5B3" stopOpacity="0.3"/>
              <stop offset="100%" stopColor="#46D5B3" stopOpacity="0"/>
            </linearGradient>
            <linearGradient id="g2" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stopColor="#48A6F6" stopOpacity="0.25"/>
              <stop offset="100%" stopColor="#48A6F6" stopOpacity="0"/>
            </linearGradient>
          </defs>
          {/* Grid lines */}
          {[20,60,100,140].map(y => (
            <line key={y} x1="0" y1={y} x2="640" y2={y} stroke="#F4F7F9" strokeWidth="1"/>
          ))}
          {/* Dataset 1 - teal */}
          <polyline points="0,120 90,80 180,40 270,60 360,20 450,50 540,30 640,45"
            fill="url(#g1)" stroke={COLORS.teal} strokeWidth="2.5" strokeLinejoin="round"/>
          {/* Dataset 2 - blue */}
          <polyline points="0,130 90,110 180,90 270,100 360,70 450,80 540,60 640,75"
            fill="url(#g2)" stroke={COLORS.info} strokeWidth="2" strokeLinejoin="round" strokeDasharray="none"/>
          {/* Day labels */}
          {['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map((d,i) => (
            <text key={d} x={i * 95 + 10} y="138" fontSize="9" fill={COLORS.textMuted} textAnchor="middle">{d.toUpperCase()}</text>
          ))}
        </svg>
        <div style={{ display: 'flex', gap: 16, marginTop: 8 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 5, fontSize: 11, color: COLORS.textMuted }}>
            <span style={{ display: 'inline-block', width: 16, height: 2, background: COLORS.teal, borderRadius: 1 }}></span>
            Uplink
          </div>
          <div style={{ display: 'flex', alignItems: 'center', gap: 5, fontSize: 11, color: COLORS.textMuted }}>
            <span style={{ display: 'inline-block', width: 16, height: 2, background: COLORS.info, borderRadius: 1 }}></span>
            Downlink
          </div>
        </div>
      </div>
    </div>
  );
}

// ── Main App ─────────────────────────────────────────────────────────────────
function App() {
  const [screen, setScreen] = useState('login');
  const [activeNav, setActiveNav] = useState('networks');
  const [activeSide, setActiveSide] = useState('overview');
  const [drawerOpen, setDrawerOpen] = useState(false);

  const handleNav = (key) => {
    setActiveNav(key);
    if (key === 'analytics') setActiveSide('analytics');
    else if (key === 'networks') setActiveSide('overview');
    else if (key === 'clients') setActiveSide('clients');
    else if (key === 'org') setActiveSide(null);
  };

  const handleSide = (key) => {
    setActiveSide(key);
  };

  const renderContent = () => {
    if (activeNav === 'analytics') return <AnalyticsScreen />;
    if (activeNav === 'org') return <TenantList />;
    if (activeSide === 'overview' || activeNav === 'networks') {
      if (activeSide === 'ran' || activeSide === 'clients' || activeSide === 'policies' || activeSide === 'sim' || activeSide === 'settings') {
        return (
          <DeviceList onSelectDevice={() => setDrawerOpen(true)} />
        );
      }
      return <NetworkDashboard />;
    }
    return <NetworkDashboard />;
  };

  if (screen === 'login') {
    return <LoginScreen onLogin={() => setScreen('app')} />;
  }

  return (
    <AppShell activeNav={activeNav} activeSide={activeSide} onNav={handleNav} onSide={handleSide}>
      {renderContent()}
      <FormDrawer title="Add New Device" open={drawerOpen} onClose={() => setDrawerOpen(false)}>
        <AddDeviceForm onClose={() => setDrawerOpen(false)} />
      </FormDrawer>
    </AppShell>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
