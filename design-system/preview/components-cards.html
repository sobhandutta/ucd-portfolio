<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: "Roboto", sans-serif; background: #F4F7F9; padding: 20px; }
  .section-label { font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: #6A6F81; margin: 16px 0 10px; }
  .section-label:first-child { margin-top: 0; }
  /* KPI Card */
  .kpi-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
  .kpi-card {
    background: #fff; border: 1px solid #E2EAF4; border-radius: 4px;
    padding: 16px 20px; box-shadow: 0px 0px 22px 0.05px #EFEFEF;
  }
  .kpi-card-title { font-size: 11px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; color: #394463; margin-bottom: 12px; }
  .kpi-metrics { display: flex; gap: 20px; align-items: baseline; flex-wrap: wrap; }
  .kpi-item { display: flex; flex-direction: column; gap: 3px; }
  .kpi-val { font-size: 22px; font-weight: 600; color: #141414; line-height: 1; }
  .kpi-label { font-size: 11px; color: #394463; display: flex; align-items: center; gap: 4px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .kpi-sub { font-size: 11px; color: #6A6F81; }
  /* Component card */
  .comp-card {
    background: #fff; border: 1px solid #E2EAF4; border-radius: 4px;
    box-shadow: 0px 0px 22px 0.05px #EFEFEF;
  }
  .comp-card-header {
    padding: 14px 20px 12px; border-bottom: 1px solid #E5E5E5;
    display: flex; justify-content: space-between; align-items: center;
  }
  .comp-card-title { font-size: 14px; font-weight: 700; color: #141414; text-transform: capitalize; }
  .comp-card-body { padding: 16px 20px; }
  .detail-row { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid #F4F7F9; font-size: 13px; }
  .detail-label { color: #394463; font-size: 12px; font-weight: 700; text-transform: capitalize; }
  .detail-val { color: #141414; }
</style>
</head>
<body>
  <div class="section-label">KPI Widget Cards</div>
  <div class="kpi-grid">
    <div class="kpi-card">
      <div class="kpi-card-title">System (Up Time: 13 Days)</div>
      <div class="kpi-metrics">
        <div class="kpi-item">
          <div class="kpi-val">6</div>
          <div class="kpi-label"><span class="dot" style="background:#46D5B3;"></span> Pods</div>
          <div class="kpi-sub">14 Disk</div>
        </div>
        <div class="kpi-item">
          <div class="kpi-val">4.3%</div>
          <div class="kpi-label"><span class="dot" style="background:#46D5B3;"></span> CPU</div>
          <div class="kpi-sub">80 Cores</div>
        </div>
        <div class="kpi-item">
          <div class="kpi-val">84.4%</div>
          <div class="kpi-label"><span class="dot" style="background:#FF4930;"></span> Memory</div>
          <div class="kpi-sub">250 GiB</div>
        </div>
      </div>
    </div>
    <div class="kpi-card">
      <div class="kpi-card-title">5GC (Up Time: 13 Days)</div>
      <div class="kpi-metrics">
        <div class="kpi-item">
          <div class="kpi-val">11</div>
          <div class="kpi-label"><span class="dot" style="background:#46D5B3;"></span> Pods</div>
          <div class="kpi-sub">14 Disk</div>
        </div>
        <div class="kpi-item">
          <div class="kpi-val">4.3%</div>
          <div class="kpi-label"><span class="dot" style="background:#46D5B3;"></span> CPU</div>
          <div class="kpi-sub">80 Cores</div>
        </div>
        <div class="kpi-item">
          <div class="kpi-val">14.4%</div>
          <div class="kpi-label"><span class="dot" style="background:#46D5B3;"></span> Memory</div>
          <div class="kpi-sub">250 GiB</div>
        </div>
      </div>
    </div>
  </div>

  <div class="section-label">Detail Card</div>
  <div class="comp-card">
    <div class="comp-card-header">
      <div class="comp-card-title">Network Details</div>
      <button style="background:none;border:none;cursor:pointer;color:#125695;font-size:13px;font-weight:500;font-family:Roboto,sans-serif;">Edit</button>
    </div>
    <div class="comp-card-body">
      <div class="detail-row"><span class="detail-label">Network Name</span><span class="detail-val">Tokyo Office 5G</span></div>
      <div class="detail-row"><span class="detail-label">Status</span><span class="detail-val" style="display:flex;align-items:center;gap:6px;"><span class="dot" style="background:#46D5B3;"></span> Up</span></div>
      <div class="detail-row"><span class="detail-label">UPF IP</span><span class="detail-val" style="font-family:monospace;font-size:13px;">10.0.1.254</span></div>
      <div class="detail-row" style="border-bottom:none;"><span class="detail-label">Version</span><span class="detail-val">v1.6.599</span></div>
    </div>
  </div>
</body>
</html>
