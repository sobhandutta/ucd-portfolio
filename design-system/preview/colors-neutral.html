<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: "Work Sans", "Roboto", sans-serif; background: #F4F7F9; padding: 20px; }
  .row { display: flex; gap: 8px; }
  .swatch { flex: 1; }
  .swatch-block { height: 52px; border-radius: 4px; margin-bottom: 5px; }
  .swatch-name { font-size: 10px; font-weight: 600; color: #394463; }
  .swatch-hex  { font-size: 9px; color: #6A6F81; font-family: monospace; }
  .section-label { font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: #6A6F81; margin: 14px 0 8px; }
</style>
</head>
<body>
<div class="section-label">Neutral Scale</div>
<div class="row">
  <div class="swatch">
    <div class="swatch-block" style="background:#000000;"></div>
    <div class="swatch-name">Black</div><div class="swatch-hex">#000</div>
  </div>
  <div class="swatch">
    <div class="swatch-block" style="background:#141414;"></div>
    <div class="swatch-name">Gray 900</div><div class="swatch-hex">#141414</div>
  </div>
  <div class="swatch">
    <div class="swatch-block" style="background:#23262C;"></div>
    <div class="swatch-name">Gray 800</div><div class="swatch-hex">#23262C</div>
  </div>
  <div class="swatch">
    <div class="swatch-block" style="background:#394463;"></div>
    <div class="swatch-name">Label</div><div class="swatch-hex">#394463</div>
  </div>
  <div class="swatch">
    <div class="swatch-block" style="background:#6A6F81;"></div>
    <div class="swatch-name">Gray 500</div><div class="swatch-hex">#6A6F81</div>
  </div>
  <div class="swatch">
    <div class="swatch-block" style="background:#C4C4C4; border:1px solid #eee;"></div>
    <div class="swatch-name">Gray 400</div><div class="swatch-hex">#C4C4C4</div>
  </div>
  <div class="swatch">
    <div class="swatch-block" style="background:#D3D3D3; border:1px solid #eee;"></div>
    <div class="swatch-name">Gray 300</div><div class="swatch-hex">#D3D3D3</div>
  </div>
  <div class="swatch">
    <div class="swatch-block" style="background:#D9E3F0; border:1px solid #eee;"></div>
    <div class="swatch-name">Border</div><div class="swatch-hex">#D9E3F0</div>
  </div>
  <div class="swatch">
    <div class="swatch-block" style="background:#EEF0F1; border:1px solid #ddd;"></div>
    <div class="swatch-name">Gray 100</div><div class="swatch-hex">#EEF0F1</div>
  </div>
  <div class="swatch">
    <div class="swatch-block" style="background:#F4F7F9; border:1px solid #ddd;"></div>
    <div class="swatch-name">Page BG</div><div class="swatch-hex">#F4F7F9</div>
  </div>
  <div class="swatch">
    <div class="swatch-block" style="background:#FFFFFF; border:1px solid #ddd;"></div>
    <div class="swatch-name">White</div><div class="swatch-hex">#FFFFFF</div>
  </div>
</div>
</body>
</html>
